<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Vibe Quote Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:opsz,wght@5..120,500;5..120,650&family=Inter:wght@450;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>

  <body>
    <div class="wrap">
      <header>
        <div class="brand" aria-label="App header">
          <h1>Vibe Quote Generator</h1>
          <div class="rule" aria-hidden="true"></div>
        </div>

        <button
          class="btn ghost drawerToggle"
          id="favoritesToggle"
          type="button"
          aria-controls="favoritesDrawer"
          aria-expanded="false"
        >
          Favorites <span class="pill" id="favoritesCount">0</span>
        </button>
      </header>

      <main>
        <section class="card" aria-label="Quote card">
          <p class="quote" id="quoteText">Loading a quote…</p>

          <div class="meta">
            <p class="author" id="quoteAuthor">—</p>
            <div class="tags" id="quoteTags" aria-label="Quote tags"></div>
          </div>

          <div class="controls" aria-label="Actions">
            <button class="btn primary" id="newQuoteBtn" type="button">New Quote</button>
            <button class="btn" id="copyBtn" type="button">Copy</button>
            <button class="btn" id="favoriteBtn" type="button" aria-pressed="false">Favorite</button>
          </div>

          <div class="statusRow">
            <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true"></div>
            <div class="hint">
              <span class="kbd">Esc</span> closes drawer
            </div>
          </div>
        </section>
      </main>

      <footer>
        Quotes from <strong>&nbsp;Quotable&nbsp;</strong> · Favorites stay in your browser (localStorage)
      </footer>
    </div>

    <div class="overlay" id="overlay" aria-hidden="true" hidden></div>

    <aside
      class="drawer"
      id="favoritesDrawer"
      role="dialog"
      tabindex="-1"
      aria-modal="true"
      aria-labelledby="drawerTitle"
      aria-hidden="true"
      inert
    >
      <div class="drawerHeader">
        <h2 id="drawerTitle">Favorites</h2>
        <button class="btn" id="closeDrawerBtn" type="button">Close</button>
      </div>

      <div class="drawerBody">
        <p class="empty" id="favoritesEmpty" hidden>
          Your favorites list is empty. When you find a quote worth keeping, hit <strong>Favorite</strong>.
        </p>
        <ul class="favList" id="favoritesList" aria-label="Favorite quotes"></ul>
      </div>

      <div class="drawerHeader" style="border-top: 1px solid rgba(255, 255, 255, 0.1); border-bottom: none">
        <span style="color: rgba(255, 255, 255, 0.55); font: 450 12px/1.4 var(--sans)"
          >Tip: click “Show” to load a favorite</span
        >
        <button class="btn danger" id="clearFavoritesBtn" type="button">Clear</button>
      </div>
    </aside>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
